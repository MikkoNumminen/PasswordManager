<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>PasswordManager</title>
<style>
  :root { color-scheme: dark; }
  body { font-family: system-ui, sans-serif; background: #14161a; color: #e6e6e6;
    width: 22rem; margin: 0; padding: 0.75rem; }
  h1 { font-size: 1rem; margin: 0 0 0.5rem; }
  input { width: 100%; box-sizing: border-box; background: #14161a; color: #e6e6e6;
    border: 1px solid #3a4150; border-radius: 4px; padding: 0.4rem; font-size: 0.95rem; }
  button { background: #2f6feb; color: #fff; border: 0; border-radius: 4px;
    padding: 0.35rem 0.7rem; font-size: 0.85rem; cursor: pointer; }
  button.small { padding: 0.15rem 0.45rem; font-size: 0.75rem; background: #3a4150; }
  .bar { display: flex; gap: 0.4rem; align-items: center; margin: 0.4rem 0; }
  .bar input[type="checkbox"] { width: auto; }
  .muted { color: #9aa4b2; font-size: 0.8rem; }
  .error { color: #ff7b72; }
  .warn { background: #3a2f14; border: 1px solid #7a5f2f; border-radius: 4px;
    padding: 0.5rem; font-size: 0.8rem; margin: 0.4rem 0; }
  .hidden { display: none; }
  .entry { border-top: 1px solid #2c313a; padding: 0.4rem 0; }
  .entry .title { font-weight: 600; }
  .entry .sub { color: #9aa4b2; font-size: 0.8rem; word-break: break-all; }
  .entry .pw { font-family: monospace; }
  .actions { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.3rem; }
  a { color: #6ea8fe; cursor: pointer; }
</style>
</head>
<body>
<h1>PasswordManager</h1>

<div id="update" class="warn hidden"></div>

<div id="needs-config" class="hidden">
  <p class="muted">No server configured yet.</p>
  <button id="open-options">Open options</button>
</div>

<div id="needs-auth" class="hidden">
  <p class="muted">Sign-in required at the gate. Open the server, sign in, then reopen this.</p>
  <button id="open-server">Open server</button>
</div>

<div id="locked" class="hidden">
  <div class="bar">
    <input id="master" type="password" placeholder="Master password" autocomplete="off" />
    <button id="unlock">Unlock</button>
  </div>
  <p id="unlock-status" class="muted"></p>
</div>

<div id="vault" class="hidden">
  <div class="bar">
    <input id="search" type="text" placeholder="Search" autocomplete="off" />
    <button id="lock" class="small">Lock</button>
  </div>
  <div class="bar">
    <label class="muted"><input id="all-sites" type="checkbox" /> all sites</label>
    <span id="scope" class="muted"></span>
  </div>
  <div id="list"></div>
  <p id="empty" class="muted hidden">No entries for this site.</p>
</div>

<script type="module" src="src/popup.js"></script>
</body>
</html>
