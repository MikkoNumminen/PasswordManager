# oauth2-proxy: the Google identity gate in front of the vault server.
#
# Layering (matches the spec: Google gate first, then the vault's own auth):
#   Tailscale Funnel (public, TLS)  ->  oauth2-proxy (this, Google login)
#     ->  password-manager-server 127.0.0.1:7787  (API token + zero-knowledge)
#
# Only settings that are not secret live here. The Google client id, client
# secret, and cookie secret come from environment variables set by
# serve-public.ps1 from the out-of-repo secrets file. Nothing secret is
# committed.

provider = "google"

# oauth2-proxy listens here; Tailscale Funnel forwards port 443 to it.
http_address = "127.0.0.1:4180"

# Everything that passes the gate is forwarded to the vault server, which
# serves both the browser client and the API. oauth2-proxy handles /oauth2/*
# for its own login flow; the vault uses no such paths.
upstreams = ["http://127.0.0.1:7787/"]

# Public callback on the Tailscale Funnel hostname. The vault funnels on port
# 8443 (443 belongs to the GPU RAGs), so the port is part of the URL. This
# exact URL must be an authorized redirect URI on the Google OAuth client.
redirect_url = "https://paskamyrsky.tail6ed53b.ts.net:8443/oauth2/callback"
whitelist_domains = ["paskamyrsky.tail6ed53b.ts.net:8443"]

# Only addresses listed in this file may pass, regardless of domain. Keep it
# to your own email. Path is set by serve-public.ps1.
email_domains = ["*"]

# Terminated TLS is at the Tailscale edge; oauth2-proxy sees plain HTTP from
# the funnel and must trust the forwarded proto for secure cookies.
reverse_proxy = true
cookie_secure = true
cookie_httponly = true
cookie_samesite = "lax"

# Show the provider login page rather than an interstitial button.
skip_provider_button = true
